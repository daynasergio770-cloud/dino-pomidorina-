<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>Cube Timer</title>
<style>
  :root{
    --bg:#fdfdfb;--ink:#161616;--dim:#8e8e8e;--line:#e7e7e2;--soft:#f6f6f2;
    --blue:#3b6fe0;--green:#2fae6b;--red:#e3514b;--orange:#f0892e;--yellow:#f2c33d;--sky:#46b6e0;
    --cube-size:min(74vw,300px);--tz:min(37vw,150px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%;position:fixed;inset:0;width:100%;overflow:hidden;overscroll-behavior:none}
  body{
    background:var(--bg);color:var(--ink);
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    overflow:hidden;display:flex;flex-direction:column;
    -webkit-user-select:none;user-select:none;
    background-image:
      linear-gradient(rgba(0,0,0,.025) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,0,0,.025) 1px,transparent 1px),
      radial-gradient(var(--line) 1px,transparent 1px);
    background-size:88px 88px,88px 88px,22px 22px;background-position:center;
  }
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}

  .topbar{flex:0 0 auto;padding:max(18px,env(safe-area-inset-top)) 16px 8px;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .navspacer{width:48px;flex:0 0 auto}
  .facenav{display:flex;gap:7px;flex:0 1 auto;justify-content:center}
  .fbtn{width:30px;height:30px;border-radius:7px;border:1.5px solid var(--c);background:rgba(255,255,255,.72);color:var(--ink);font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;display:grid;place-items:center;padding:0;transition:transform .12s ease,background .15s ease,box-shadow .15s ease;-webkit-tap-highlight-color:transparent}
  .fbtn:active{transform:scale(.88)}
  .fbtn.active{background:var(--c);color:#fff;box-shadow:0 8px 18px -14px var(--c)}
  .tomato{width:48px;height:48px;border:1px solid var(--line);border-radius:50%;background:#fff;display:grid;place-items:center;cursor:pointer;transition:transform .15s ease;box-shadow:0 6px 18px -12px rgba(0,0,0,.4);flex:0 0 auto}
  .tomato:active{transform:scale(.9)}
  .tomato svg{display:block}

  .stage{flex:1 1 auto;display:flex;align-items:center;justify-content:center;position:relative;perspective:1200px;transition:transform .25s ease;transform:translateY(var(--stage-y,0));padding-bottom:18px}
  .stage.typing{--stage-y:0px}
  .rig{position:relative;width:var(--cube-size);height:var(--cube-size);touch-action:none;cursor:grab;flex:0 0 auto}
  .rig.typing-rig{cursor:text;touch-action:manipulation}
  .rig:active{cursor:grabbing}
  .rig.typing-rig:active{cursor:text}

  .cube{position:absolute;inset:0;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.34,1.15,.5,1);will-change:transform}
  .cube.typing{transition:transform .28s cubic-bezier(.22,.8,.25,1)}
  .cube.typing .face:not(.typing-face){pointer-events:none}
  .face{
    position:absolute;inset:0;border-radius:10px;background:linear-gradient(180deg,#fff 0%,#fbfbf8 100%);border:1px solid var(--line);
    box-shadow:0 22px 46px -34px rgba(0,0,0,.48);display:flex;flex-direction:column;
    padding:24px 22px 22px;overflow:hidden;-webkit-backface-visibility:hidden;backface-visibility:hidden;
    pointer-events:none;
  }
  .face.f-blue  {transform:rotateY(0deg)   translateZ(var(--tz))}
  .face.f-green {transform:rotateY(90deg)  translateZ(var(--tz))}
  .face.f-red   {transform:rotateY(180deg) translateZ(var(--tz))}
  .face.f-orange{transform:rotateY(-90deg) translateZ(var(--tz))}
  .face.f-top   {transform:rotateX(90deg)  translateZ(var(--tz))}
  .face.f-bottom{transform:rotateX(-90deg) translateZ(var(--tz))}
  .face::after{content:"";position:absolute;right:18px;bottom:18px;width:48px;height:24px;background-image:radial-gradient(rgba(22,22,22,.18) 1px,transparent 1.2px);background-size:7px 7px;opacity:.22;pointer-events:none}
  .face.front-face{pointer-events:auto}
  .face.typing-face{border-color:color-mix(in srgb,var(--face-accent) 48%,var(--line));box-shadow:0 24px 54px -34px rgba(0,0,0,.62),0 0 0 1px rgba(255,255,255,.88) inset}

  /* Nothing-style accent: a dotted/dot-matrix bar instead of a solid stripe. */
  .accent{position:absolute;left:22px;right:22px;top:18px;height:6px;
    background-image:radial-gradient(currentColor 1.6px,transparent 1.7px);
    background-size:9px 6px;background-repeat:repeat-x;opacity:.9}
  .f-blue   {--face-accent:var(--blue)}   .f-blue   .accent{color:var(--blue)}
  .f-green  {--face-accent:var(--green)}  .f-green  .accent{color:var(--green)}
  .f-red    {--face-accent:var(--red)}    .f-red    .accent{color:var(--red)}
  .f-orange {--face-accent:var(--orange)} .f-orange .accent{color:var(--orange)}
  .f-top    {--face-accent:var(--sky)}    .f-top    .accent{color:var(--sky)}
  .f-bottom {--face-accent:var(--yellow)} .f-bottom .accent{color:var(--yellow)}

  .bigtime{font-size:64px;font-weight:500;line-height:1.16;margin-top:auto;letter-spacing:0;font-variant-numeric:tabular-nums}
  .bigtime .u{font-size:15px;color:var(--dim);letter-spacing:1px;margin-left:6px}

  .actwrap{margin-top:16px;position:relative;z-index:1}
  .actlabel{font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:6px}
  .actinput{width:100%;min-height:34px;border:none;border-bottom:1px solid var(--line);background:transparent;font-family:inherit;font-size:14px;color:var(--ink);padding:5px 0;outline:none;-webkit-user-select:text;user-select:text;border-radius:0}
  .actinput:focus{border-color:var(--face-accent,var(--ink));box-shadow:0 4px 0 -3px var(--face-accent,var(--ink))}
  .actinput::placeholder{color:#cfcfcf}
  .actinput.proxy-active{color:transparent!important;caret-color:transparent!important;border-bottom-color:transparent!important;box-shadow:none!important}
  .actinput.proxy-active::placeholder{color:transparent!important}
  .face.typing-face .actlabel{color:var(--ink)}
  .typing-proxy{
    position:fixed;left:0;top:0;width:0;height:34px;z-index:35;
    border:none;border-bottom:1px solid var(--proxy-accent,var(--ink));
    background:transparent;color:var(--ink);font-family:inherit;font-size:14px;
    line-height:normal;padding:5px 0;outline:none;border-radius:0;
    -webkit-user-select:text;user-select:text;caret-color:var(--ink);
    opacity:0;pointer-events:none;transform:translate3d(-9999px,-9999px,0);
    box-shadow:0 4px 0 -3px var(--proxy-accent,var(--ink));
  }
  .typing-proxy.on{opacity:1;pointer-events:auto}
  .typing-proxy::placeholder{color:#cfcfcf}

  .startbtn{margin-top:18px;width:100%;border:none;border-radius:8px;padding:15px;font-family:inherit;font-size:14px;letter-spacing:3px;color:#fff;cursor:pointer;text-transform:uppercase;transition:transform .12s,filter .15s}
  .startbtn:active{transform:scale(.97)}
  .startbtn:disabled{opacity:.4;cursor:default}
  .startbtn:disabled:active{transform:none}
  .f-blue .startbtn{background:var(--blue)}
  .f-green .startbtn{background:var(--green)}
  .f-red .startbtn{background:var(--red)}
  .f-orange .startbtn{background:var(--orange)}
  .f-top .startbtn{background:var(--sky)}

  .stepper{display:flex;align-items:center;gap:14px;margin-top:auto}
  .stepbtn{width:48px;height:48px;border-radius:8px;border:1px solid var(--line);background:#fff;font-size:24px;color:var(--ink);cursor:pointer;display:grid;place-items:center;font-family:inherit;transition:transform .12s,background .15s}
  .stepbtn:active{transform:scale(.9)}
  .customval{flex:1;text-align:center;font-size:46px;font-weight:500;font-variant-numeric:tabular-nums;line-height:1}
  .customval .u{font-size:13px;color:var(--dim);display:block;letter-spacing:2px;margin-top:4px}

  .statgrid{margin-top:18px;display:flex;flex-direction:column;gap:11px;flex:1;justify-content:center}
  .statrow{display:flex;align-items:center;gap:12px;font-size:14px}
  .swatch{width:11px;height:11px;border-radius:3px;flex:0 0 auto}
  .statname{flex:1;color:var(--ink);font-variant-numeric:tabular-nums}
  .statnum{color:var(--dim);font-variant-numeric:tabular-nums}
  .totalbox{margin-top:16px;padding-top:14px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:baseline}
  .totalbox .tl{font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase}
  .totalbox .tv{font-size:28px;font-weight:500;font-variant-numeric:tabular-nums}
  .totalbox .tv span{font-size:12px;color:var(--dim);margin-left:4px}

  .runner{position:fixed;inset:0;z-index:40;background:#fff;display:none;flex-direction:column;align-items:center;justify-content:center;padding:env(safe-area-inset-top) 24px env(safe-area-inset-bottom)}
  .runner.on{display:flex}
  .runact{font-size:16px;color:var(--ink);margin-bottom:30px;text-align:center;min-height:20px;max-width:80%}
  .ring{position:relative;width:min(72vw,280px);height:min(72vw,280px)}
  .ring svg{transform:rotate(-90deg);width:100%;height:100%}
  .ring .runtime{position:absolute;inset:0;display:grid;place-items:center;font-size:54px;font-weight:500;font-variant-numeric:tabular-nums;letter-spacing:0}
  .runctrl{display:flex;gap:14px;margin-top:34px}
  .rbtn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:14px 26px;font-family:inherit;font-size:13px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;color:var(--ink);transition:transform .12s}
  .rbtn:active{transform:scale(.95)}
  .rbtn.stop{border-color:var(--red);color:var(--red)}

  .sheet{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.18);display:none;align-items:flex-end;backdrop-filter:blur(2px)}
  .sheet.on{display:flex}
  .sheetcard{background:#fff;width:100%;border-radius:24px 24px 0 0;padding:22px 22px max(26px,env(safe-area-inset-bottom));max-height:86vh;overflow-y:auto;box-shadow:0 -20px 50px -30px rgba(0,0,0,.4);animation:rise .28s cubic-bezier(.3,1,.5,1)}
  @keyframes rise{from{transform:translateY(40px);opacity:.5}to{transform:translateY(0);opacity:1}}
  .sheethead{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
  .sheethead h2{font-size:15px;letter-spacing:2px;text-transform:uppercase;font-weight:500}
  .closex{border:none;background:none;font-size:24px;color:var(--dim);cursor:pointer;line-height:1}
  .sheetsub{font-size:11px;color:var(--dim);margin-bottom:18px;letter-spacing:1px}
  .dayhead{display:flex;align-items:baseline;gap:10px;width:100%;margin:6px 0 0;padding:14px 0;background:none;border:none;border-top:1px solid var(--line);font-family:inherit;cursor:pointer;text-align:left}
  .dayhead:first-of-type{border-top:none;margin-top:0}
  .dayhead .chev{font-size:13px;color:var(--dim);width:12px;flex:0 0 auto}
  .dayhead .dl{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink);font-weight:500;flex:1}
  .dayhead .dt{font-size:12px;color:var(--dim);font-variant-numeric:tabular-nums}
  .actstat{padding:13px 0;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:baseline;gap:12px}
  .actstat .nm{font-size:14px;color:var(--ink);word-break:break-word;flex:1}
  .actstat .mn{font-size:16px;font-weight:500;font-variant-numeric:tabular-nums;white-space:nowrap}
  .actstat .mn span{font-size:11px;color:var(--dim);margin-left:3px}
  .emptystate{padding:40px 10px;text-align:center;color:var(--dim);font-size:13px;line-height:1.7}
  .grandtotal{margin-top:18px;padding:16px;border-radius:16px;background:#f7f7f7;display:flex;justify-content:space-between;align-items:baseline}
  .grandtotal .gl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--dim)}
  .grandtotal .gv{font-size:30px;font-weight:500;font-variant-numeric:tabular-nums}
  .grandtotal .gv span{font-size:13px;color:var(--dim);margin-left:4px}
  .resetbtn{margin-top:14px;width:100%;border:1px solid var(--line);background:#fff;border-radius:12px;padding:12px;font-family:inherit;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);cursor:pointer}
  .resetbtn:active{background:#fafafa}

  .toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 24px);transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:12px;letter-spacing:1px;padding:11px 18px;border-radius:12px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:80}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

  <div class="topbar">
    <div class="navspacer"></div>
    <div class="facenav" id="faceNav">
      <button class="fbtn" data-go="blue"   style="--c:var(--blue)">5</button>
      <button class="fbtn" data-go="green"  style="--c:var(--green)">25</button>
      <button class="fbtn" data-go="red"    style="--c:var(--red)">40</button>
      <button class="fbtn" data-go="orange" style="--c:var(--orange)">60</button>
      <button class="fbtn" data-go="custom" style="--c:var(--sky)">∿</button>
      <button class="fbtn" data-go="stats"  style="--c:var(--yellow)">∑</button>
    </div>
    <div class="tomato" id="tomato" aria-label="Statistics">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M12 7c-3.3 0-6 2.4-6 5.6C6 16.5 9 19 12 19s6-2.5 6-6.4C18 9.4 15.3 7 12 7Z" fill="#e3514b"/>
        <path d="M9.5 5.5c.8 1 1.7 1.5 2.5 1.5s1.7-.5 2.5-1.5" stroke="#2fae6b" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M12 7V5.2" stroke="#2fae6b" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <div class="stage">
    <div class="rig" id="rig">

      <div class="cube" id="cube">
        <div class="face f-blue" data-key="blue">
          <div class="accent"></div>
          <div class="bigtime">5<span class="u">min</span></div>
          <div class="actwrap">
            <div class="actlabel">Action</div>
            <input class="actinput" data-act="blue" placeholder="what are we doing?">
          </div>
          <button class="startbtn" data-start="blue" data-min="5">Start</button>
        </div>

        <div class="face f-green" data-key="green">
          <div class="accent"></div>
          <div class="bigtime">25<span class="u">min</span></div>
          <div class="actwrap">
            <div class="actlabel">Action</div>
            <input class="actinput" data-act="green" placeholder="what are we doing?">
          </div>
          <button class="startbtn" data-start="green" data-min="25">Start</button>
        </div>

        <div class="face f-red" data-key="red">
          <div class="accent"></div>
          <div class="bigtime">40<span class="u">min</span></div>
          <div class="actwrap">
            <div class="actlabel">Action</div>
            <input class="actinput" data-act="red" placeholder="what are we doing?">
          </div>
          <button class="startbtn" data-start="red" data-min="40">Start</button>
        </div>

        <div class="face f-orange" data-key="orange">
          <div class="accent"></div>
          <div class="bigtime">60<span class="u">min</span></div>
          <div class="actwrap">
            <div class="actlabel">Action</div>
            <input class="actinput" data-act="orange" placeholder="what are we doing?">
          </div>
          <button class="startbtn" data-start="orange" data-min="60">Start</button>
        </div>

        <div class="face f-top" data-key="custom">
          <div class="accent"></div>
          <div class="stepper">
            <button class="stepbtn" id="customMinus">&minus;</button>
            <div class="customval"><span id="customNum">30</span><span class="u">min</span></div>
            <button class="stepbtn" id="customPlus">+</button>
          </div>
          <div class="actwrap">
            <div class="actlabel">Action</div>
            <input class="actinput" data-act="custom" placeholder="what are we doing?">
          </div>
          <button class="startbtn" data-start="custom">Start</button>
        </div>

        <div class="face f-bottom" data-key="stats">
          <div class="accent"></div>
          <div class="statgrid" id="statGrid"></div>
          <div class="totalbox">
            <div class="tl">Total used</div>
            <div class="tv" id="grandMin">0<span>min</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="runner" id="runner">
    <div class="runact" id="runAct"></div>
    <div class="ring">
      <svg viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="45" fill="none" stroke="#ececec" stroke-width="3"/>
        <circle id="ringProg" cx="50" cy="50" r="45" fill="none" stroke="#3b6fe0" stroke-width="3" stroke-linecap="round" stroke-dasharray="282.7" stroke-dashoffset="0"/>
      </svg>
      <div class="runtime" id="runTime">05:00</div>
    </div>
    <div class="runctrl">
      <button class="rbtn" id="pauseBtn">Pause</button>
      <button class="rbtn stop" id="stopBtn">Stop</button>
    </div>
  </div>

  <div class="sheet" id="sheet">
    <div class="sheetcard">
      <div class="sheethead">
        <h2>Statistics</h2>
        <button class="closex" id="closeSheet">&times;</button>
      </div>
      <div class="sheetsub">By day — what your minutes went to</div>
      <div id="actStats"></div>
      <div class="grandtotal">
        <div class="gl">Total</div>
        <div class="gv" id="sheetTotal">0<span>min</span></div>
      </div>
      <button class="resetbtn" id="resetBtn">Reset all statistics</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <input class="typing-proxy" id="typingProxy" autocomplete="off" autocapitalize="sentences" spellcheck="false">

<script>
(function(){
  // Block page drag/rubber-band so vertical cube spins don't move the page.
  // Allow scrolling inside the stats sheet.
  document.addEventListener('touchmove',function(e){
    if(!e.target.closest('.sheetcard')) e.preventDefault();
  },{passive:false});
  const cube = document.getElementById('cube');
  const stageEl=document.querySelector('.stage');
  const rigEl=document.getElementById('rig');
  const typingProxy=document.getElementById('typingProxy');

  // ---- persistence ----
  const KEY='pomocube_v2';
  let store = {
    faceCount:{blue:0,green:0,red:0,orange:0,custom:0},
    faceMin:{blue:0,green:0,red:0,orange:0,custom:0},
    actMin:{}, acts:{blue:'',green:'',red:'',orange:'',custom:''}, custom:30, log:[]
  };
  try{
    const raw = localStorage.getItem(KEY);
    if(raw) Object.assign(store, JSON.parse(raw));
  }catch(e){}
  function save(){ try{ localStorage.setItem(KEY, JSON.stringify(store)); }catch(e){} }

  document.querySelectorAll('.actinput').forEach(inp=>{
    const k=inp.dataset.act; inp.value = store.acts[k]||'';
    inp.addEventListener('input',()=>{ store.acts[k]=inp.value; save(); refreshStartButtons(); });
  });
  function refreshStartButtons(){
    document.querySelectorAll('.startbtn').forEach(btn=>{
      const key=btn.dataset.start;
      const filled=(store.acts[key]||'').trim().length>0;
      btn.disabled=!filled;
    });
  }
  let customMin = store.custom||30;
  const customNum=document.getElementById('customNum');
  customNum.textContent=customMin;

  // ---- rotation (free drag + magnetic snap) ----
  // Each key maps to the cube orientation that brings its face to the front.
  const ORIENT={
    blue:  {x:0,   y:0},
    green: {x:0,   y:-90},
    red:   {x:0,   y:-180},
    orange:{x:0,   y:90},
    custom:{x:-90, y:0},   // top face
    stats: {x:90,  y:0},   // bottom face
  };
  const KEYS=['blue','green','red','orange','custom','stats'];
  let curX=0, curY=0, activeKey='blue', lastSide='blue';
  function render(){ cube.style.transform=`rotateX(${curX}deg) rotateY(${curY}deg)`; }

  // Used by the timer code to jump to a face programmatically.
  function showSide(key){
    if(!['green','orange','custom'].includes(key)) exitTypingMode();
    const o=ORIENT[key];
    let base=Math.round((curY-o.y)/360)*360;
    curY=o.y+base; curX=o.x; activeKey=key;
    if(['blue','green','red','orange'].includes(key)) lastSide=key;
    cube.style.transition='transform .55s cubic-bezier(.34,1.56,.5,1)';
    render();
    if(key==='stats') renderStats();
    updateNav();
  }
  const faceNav=document.getElementById('faceNav');
  function updateNav(){
    faceNav.querySelectorAll('.fbtn').forEach(b=>b.classList.toggle('active', b.dataset.go===activeKey));
    document.querySelectorAll('.face').forEach(face=>{
      face.classList.toggle('front-face', face.dataset.key===activeKey);
    });
  }
  faceNav.querySelectorAll('.fbtn').forEach(b=>{
    b.addEventListener('click',()=>{
      const active=document.activeElement;
      if(active && (active.matches('.actinput') || active===typingProxy)) active.blur();
      exitTypingMode();
      showSide(b.dataset.go);
      try{ if(navigator.vibrate) navigator.vibrate(12); }catch(_){}
    });
  });

  const rig=rigEl;
  let dragging=false, sx=0, sy=0, bX=0, bY=0, moved=false;
  const PROXY_INPUT_KEYS=new Set(['green','orange','custom']);
  function shouldUseTypingProxy(inp){
    return !!(inp && PROXY_INPUT_KEYS.has(inp.dataset.act));
  }
  function activeActionInput(){
    return document.querySelector('.face[data-key="'+activeKey+'"] .actinput');
  }
  function focusInputAtPoint(e){
    if(e.target.closest('input,button')) return false;
    const inp=activeActionInput();
    if(!inp) return false;
    const r=inp.getBoundingClientRect();
    const padX=16, padY=12;
    const inside=e.clientX>=r.left-padX && e.clientX<=r.right+padX &&
      e.clientY>=r.top-padY && e.clientY<=r.bottom+padY;
    if(!inside) return false;
    e.preventDefault();
    e.stopPropagation();
    enterTypingMode(inp);
    return true;
  }
  rig.addEventListener('pointerdown',e=>{
    if(focusInputAtPoint(e)) return;
    if(cube.classList.contains('typing')) return;
    if(e.target.closest('input,button')) return;
    dragging=true; moved=false;
    sx=e.clientX; sy=e.clientY; bX=curX; bY=curY;
    try{ rig.setPointerCapture(e.pointerId); }catch(_){}
    cube.style.transition='none';
  });
  rig.addEventListener('pointermove',e=>{
    if(!dragging) return;
    const dx=e.clientX-sx, dy=e.clientY-sy;
    if(Math.abs(dx)+Math.abs(dy)>4) moved=true;
    curY=bY+dx*0.6;
    curX=bX-dy*0.6;
    curX=Math.max(-135,Math.min(135,curX));
    render();
  });
  function endDrag(){
    if(!dragging) return;
    dragging=false;
    // Springy, magnetic snap: overshoots a touch then settles — reads clearly
    // as "clicking into place".
    cube.style.transition='transform .55s cubic-bezier(.34,1.56,.5,1)';
    snapToNearest();
  }
  rig.addEventListener('pointerup',endDrag);
  rig.addEventListener('pointercancel',endDrag);

  function angDist(a,b){ return Math.abs(((a-b)%360+540)%360-180); }
  function snapToNearest(){
    let best=null,bestCost=1e9,bestKey='blue';
    for(const k of KEYS){
      const o=ORIENT[k];
      const ty=o.y+Math.round((curY-o.y)/360)*360;
      const cost=angDist(curX,o.x)+angDist(curY,ty);
      if(cost<bestCost){ bestCost=cost; best={x:o.x,y:ty}; bestKey=k; }
    }
    const changed=(curX!==best.x || curY!==best.y);
    curX=best.x; curY=best.y; activeKey=bestKey;
    if(['blue','green','red','orange'].includes(bestKey)) lastSide=bestKey;
    if(bestKey==='stats') renderStats();
    render();
    updateNav();
    // tiny haptic tick on lock-in (where supported)
    if(changed){ try{ if(navigator.vibrate) navigator.vibrate(12); }catch(_){} }
  }

  // ---- custom stepper ----
  document.getElementById('customPlus').addEventListener('click',()=>{
    customMin=Math.min(180,customMin+5); customNum.textContent=customMin; store.custom=customMin; save();
  });
  document.getElementById('customMinus').addEventListener('click',()=>{
    customMin=Math.max(1,customMin-5); customNum.textContent=customMin; store.custom=customMin; save();
  });

  // ---- timer ----
  const colorByKey={blue:'#3b6fe0',green:'#2fae6b',red:'#e3514b',orange:'#f0892e',custom:'#46b6e0'};
  const runner=document.getElementById('runner');
  const ringProg=document.getElementById('ringProg');
  const runTime=document.getElementById('runTime');
  const runAct=document.getElementById('runAct');
  const stopBtn=document.getElementById('stopBtn');
  const CIRC=2*Math.PI*45;
  let totalSec=0,leftSec=0,tick=null,paused=false,runKey=null,endAt=0;
  const fmt=s=>{const m=Math.floor(s/60),ss=s%60;return String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');};

  document.querySelectorAll('.startbtn').forEach(btn=>{
    // pointerdown fires before blur, so the first tap starts the timer even
    // while the action input is focused on the cube face.
    btn.addEventListener('pointerdown',e=>{
      if(btn.disabled) return;
      e.preventDefault();
      ensureAudio();
      const key=btn.dataset.start;
      const mins = key==='custom' ? customMin : parseInt(btn.dataset.min,10);
      commitTypingProxy();
      const active=document.activeElement;
      if(active && active.blur) active.blur();
      startTimer(key,mins,(store.acts[key]||'').trim());
    });
  });

  function paint(){
    runTime.textContent=fmt(Math.max(0,leftSec));
    ringProg.style.strokeDashoffset=CIRC*(1-Math.max(0,leftSec)/totalSec);
  }
  function startTimer(key,mins,act){
    runKey=key; totalSec=mins*60; leftSec=totalSec; paused=false;
    endAt=Date.now()+totalSec*1000;
    // Make sure the cube is not left in typing mode behind the timer screen.
    exitTypingMode();
    render();
    ringProg.setAttribute('stroke',colorByKey[key]);
    runAct.textContent=act||'—';
    ringProg.style.strokeDashoffset='0';
    document.getElementById('pauseBtn').textContent='Pause';
    stopBtn.textContent='Stop'; stopArmed=false; clearTimeout(stopT);
    paint();
    runner.classList.add('on');
    if(tick)clearInterval(tick);
    tick=setInterval(()=>{
      if(paused)return;
      leftSec=Math.round((endAt-Date.now())/1000);
      paint();
      if(leftSec<=0) finishTimer(true);
    },250);
  }
  function finishTimer(completed){
    clearInterval(tick);tick=null;
    if(completed){
      const mins=Math.round(totalSec/60);
      store.faceCount[runKey]=(store.faceCount[runKey]||0)+1;
      store.faceMin[runKey]=(store.faceMin[runKey]||0)+mins;
      const act=(store.acts[runKey]||'').trim()||'(no label)';
      store.actMin[act]=(store.actMin[act]||0)+mins;
      if(!store.log) store.log=[];
      store.log.push({ts:Date.now(), act:act, min:mins, key:runKey});
      // clear the action label on that face so the next run starts fresh
      store.acts[runKey]='';
      const inp=document.querySelector('.actinput[data-act="'+runKey+'"]');
      if(inp) inp.value='';
      refreshStartButtons();
      save(); buzz(); chime(); showToast('Done · +'+mins+' min');
    }
    runner.classList.remove('on');
    // Fully reset any lingering typing state, then re-seat the cube dead-on the
    // face we ran. The cube size never changes; only rotation does.
    exitTypingMode();
    // force a clean reflow of the cube transform
    cube.style.transition='transform .4s ease';
    if(runKey){ const o=ORIENT[runKey]; let base=Math.round((curY-o.y)/360)*360; curY=o.y+base; curX=o.x; activeKey=runKey; if(['blue','green','red','orange'].includes(runKey)) lastSide=runKey; }
    render();
    updateNav();
  }
  document.getElementById('pauseBtn').addEventListener('click',function(){
    paused=!paused;
    if(paused){ leftSec=Math.round((endAt-Date.now())/1000); }
    else { endAt=Date.now()+Math.max(0,leftSec)*1000; }
    this.textContent=paused?'Resume':'Pause';
  });
  let stopArmed=false, stopT=null;
  stopBtn.addEventListener('click',()=>{
    if(!stopArmed){
      stopArmed=true; stopBtn.textContent='Tap to confirm';
      clearTimeout(stopT); stopT=setTimeout(()=>{ stopArmed=false; stopBtn.textContent='Stop'; },2500);
      return;
    }
    clearTimeout(stopT); stopArmed=false; stopBtn.textContent='Stop';
    finishTimer(false);
  });
  function buzz(){ try{ if(navigator.vibrate) navigator.vibrate([120,60,120]); }catch(e){} }
  let _actx=null;
  function ensureAudio(){
    try{ if(!_actx) _actx=new (window.AudioContext||window.webkitAudioContext)();
      if(_actx.state==='suspended') _actx.resume(); }catch(e){}
    return _actx;
  }
  function chime(){
    const ctx=ensureAudio(); if(!ctx) return;
    const now=ctx.currentTime, master=ctx.createGain();
    master.gain.value=0.9; master.connect(ctx.destination);
    [880,1760].forEach((f,i)=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.type='sine'; o.frequency.value=f;
      const peak=i===0?0.5:0.18;
      g.gain.setValueAtTime(0.0001,now);
      g.gain.exponentialRampToValueAtTime(peak,now+0.012);
      g.gain.exponentialRampToValueAtTime(0.0001,now+1.6);
      o.connect(g); g.connect(master); o.start(now); o.stop(now+1.7);
    });
  }

  // ---- stats face ----
  const faceMeta=[
    {k:'blue',c:'#3b6fe0',n:'5'},
    {k:'green',c:'#2fae6b',n:'25'},
    {k:'red',c:'#e3514b',n:'40'},
    {k:'orange',c:'#f0892e',n:'60'},
    {k:'custom',c:'#46b6e0',n:'custom'}
  ];
  function renderStats(){
    const g=document.getElementById('statGrid');g.innerHTML='';
    faceMeta.forEach(f=>{
      const cnt=store.faceCount[f.k]||0;
      const row=document.createElement('div');row.className='statrow';
      row.innerHTML='<span class="swatch" style="background:'+f.c+'"></span>'+
        '<span class="statname">'+f.n+'</span>'+
        '<span class="statnum">'+cnt+'\u00d7</span>';
      g.appendChild(row);
    });
    const tot=Object.values(store.faceMin).reduce((a,b)=>a+b,0);
    document.getElementById('grandMin').innerHTML=tot+'<span>min</span>';
  }

  // ---- full sheet ----
  const sheet=document.getElementById('sheet');
  document.getElementById('tomato').addEventListener('click',()=>{renderSheet();sheet.classList.add('on');});
  document.getElementById('closeSheet').addEventListener('click',()=>sheet.classList.remove('on'));
  sheet.addEventListener('click',e=>{if(e.target===sheet)sheet.classList.remove('on');});
  let openDays={}; // which day rows are expanded
  function renderSheet(){
    const box=document.getElementById('actStats');box.innerHTML='';
    const log=(store.log||[]);
    if(!log.length){
      box.innerHTML='<div class="emptystate">Nothing yet.<br>Finish your first timer and your minutes will show up here, grouped by day.</div>';
    }else{
      const byDay={};
      log.forEach(e=>{
        const d=new Date(e.ts);
        const dayKey=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
        (byDay[dayKey]=byDay[dayKey]||[]).push(e);
      });
      const days=Object.keys(byDay).sort().reverse();
      const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      // expand the most recent day by default the first time
      if(Object.keys(openDays).length===0 && days[0]) openDays[days[0]]=true;
      days.forEach(dayKey=>{
        const entries=byDay[dayKey];
        const perAct={};
        entries.forEach(e=>{ perAct[e.act]=(perAct[e.act]||0)+e.min; });
        const dayTotal=entries.reduce((a,e)=>a+e.min,0);
        const d=new Date(entries[0].ts);
        const label=d.getDate()+' '+months[d.getMonth()]+' '+d.getFullYear();
        const isOpen=!!openDays[dayKey];
        const head=document.createElement('button');head.className='dayhead'+(isOpen?' open':'');
        head.innerHTML='<span class="chev">'+(isOpen?'\u2304':'\u203a')+'</span>'+
          '<span class="dl">'+label+'</span><span class="dt">'+human(dayTotal)+'</span>';
        head.addEventListener('click',()=>{ openDays[dayKey]=!openDays[dayKey]; renderSheet(); });
        box.appendChild(head);
        if(isOpen){
          Object.entries(perAct).sort((a,b)=>b[1]-a[1]).forEach(([name,mins])=>{
            const row=document.createElement('div');row.className='actstat';
            row.innerHTML='<span class="nm">'+escapeHtml(name)+'</span><span class="mn">'+human(mins)+'</span>';
            box.appendChild(row);
          });
        }
      });
    }
    const tot=(store.log||[]).reduce((a,e)=>a+e.min,0);
    document.getElementById('sheetTotal').innerHTML=tot+'<span>min</span>';
  }
  function human(mins){const h=Math.floor(mins/60),m=mins%60;return h?(h+' h '+m+' min'):(m+' min');}
  function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

  document.getElementById('resetBtn').addEventListener('click',()=>{
    if(confirm('Reset all statistics? This cannot be undone.')){
      store.faceCount={blue:0,green:0,red:0,orange:0,custom:0};
      store.faceMin={blue:0,green:0,red:0,orange:0,custom:0};
      store.actMin={}; store.log=[]; save(); renderSheet(); renderStats(); showToast('Statistics reset');
    }
  });

  // ---- typing: edit directly on the visible cube face ----
  // Native carets are unreliable on rotated 3D inputs in mobile browsers. During
  // editing we place a real 2D input exactly over the face's action line, while
  // keeping the stored value in the original face input.
  let activeInput=null, proxyTarget=null;
  function enterTypingMode(inp){
    const face=inp.closest('.face');
    if(!face) return;
    const key=face.dataset.key;
    if(key){
      const o=ORIENT[key];
      const base=Math.round((curY-o.y)/360)*360;
      curY=o.y+base; curX=o.x; activeKey=key;
      if(['blue','green','red','orange'].includes(key)) lastSide=key;
      cube.style.transition='transform .28s cubic-bezier(.22,.8,.25,1)';
      render();
      updateNav();
    }
    document.querySelectorAll('.face.typing-face').forEach(f=>f.classList.remove('typing-face'));
    face.classList.add('typing-face');
    if(shouldUseTypingProxy(inp)){
      cube.classList.add('typing');
      stageEl.classList.add('typing');
      rigEl.classList.add('typing-rig');
      openTypingProxy(inp);
    }else{
      closeTypingProxy();
      activeInput=inp;
      cube.classList.remove('typing');
      stageEl.classList.remove('typing');
      stageEl.style.removeProperty('--stage-y');
      rigEl.classList.remove('typing-rig');
      if(document.activeElement!==inp){
        inp.focus({preventScroll:true});
        const end=inp.value.length;
        try{ inp.setSelectionRange(end,end); }catch(_){}
      }
    }
  }
  function openTypingProxy(inp){
    if(proxyTarget && proxyTarget!==inp) closeTypingProxy();
    proxyTarget=inp;
    activeInput=typingProxy;
    typingProxy.value=inp.value;
    typingProxy.placeholder=inp.placeholder||'';
    typingProxy.dataset.act=inp.dataset.act||'';
    const face=inp.closest('.face');
    const accent=getComputedStyle(face).getPropertyValue('--face-accent').trim() || 'var(--ink)';
    typingProxy.style.setProperty('--proxy-accent',accent);
    inp.classList.add('proxy-active');
    typingProxy.classList.add('on');
    stageEl.style.setProperty('--stage-y',window.innerWidth<=600 ? '-86px' : '0px');
    placeTypingProxy();
    typingProxy.focus({preventScroll:true});
    const end=typingProxy.value.length;
    try{ typingProxy.setSelectionRange(end,end); }catch(_){}
    requestAnimationFrame(()=>{ keepInputVisible(typingProxy); placeTypingProxy(); });
    [80,240,520].forEach(ms=>setTimeout(()=>{ if(proxyTarget===inp){ keepInputVisible(typingProxy); placeTypingProxy(); } },ms));
  }
  function placeTypingProxy(){
    if(!proxyTarget || !typingProxy.classList.contains('on')) return;
    const rect=proxyTarget.getBoundingClientRect();
    const cs=getComputedStyle(proxyTarget);
    typingProxy.style.left=rect.left+'px';
    typingProxy.style.top=rect.top+'px';
    typingProxy.style.width=rect.width+'px';
    typingProxy.style.height=rect.height+'px';
    typingProxy.style.fontSize=cs.fontSize;
    typingProxy.style.padding=cs.padding;
    typingProxy.style.transform='translate3d(0,0,0)';
  }
  function commitTypingProxy(){
    if(!proxyTarget) return;
    if(proxyTarget.value!==typingProxy.value){
      proxyTarget.value=typingProxy.value;
      proxyTarget.dispatchEvent(new Event('input',{bubbles:true}));
    }
  }
  function closeTypingProxy(opts={}){
    commitTypingProxy();
    if(opts.blur && document.activeElement===typingProxy){
      try{ typingProxy.blur(); }catch(_){}
    }
    if(proxyTarget) proxyTarget.classList.remove('proxy-active');
    proxyTarget=null;
    typingProxy.classList.remove('on');
    typingProxy.value='';
    typingProxy.placeholder='';
    typingProxy.style.transform='translate3d(-9999px,-9999px,0)';
    typingProxy.removeAttribute('data-act');
  }
  function exitTypingMode(){
    closeTypingProxy({blur:true});
    activeInput=null;
    cube.classList.remove('typing');
    stageEl.classList.remove('typing');
    stageEl.style.removeProperty('--stage-y');
    rigEl.classList.remove('typing-rig');
    document.querySelectorAll('.face.typing-face').forEach(f=>f.classList.remove('typing-face'));
  }
  function keepInputVisible(inp){
    if(!inp) return;
    const editor=proxyTarget || inp;
    if(document.activeElement!==typingProxy && document.activeElement!==editor) return;
    const vv=window.visualViewport;
    const visibleBottom=vv ? vv.offsetTop+vv.height : window.innerHeight;
    const rect=editor.getBoundingClientRect();
    const margin=34;
    const overflow=Math.max(0,rect.bottom-(visibleBottom-margin));
    const minLift=window.innerWidth<=600 ? -86 : 0;
    const lift=overflow ? Math.min(minLift,-(overflow+42)) : minLift;
    stageEl.style.setProperty('--stage-y',lift+'px');
    requestAnimationFrame(placeTypingProxy);
  }
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize',()=>{ if(activeInput) keepInputVisible(activeInput); });
    window.visualViewport.addEventListener('scroll',()=>{ if(activeInput) keepInputVisible(activeInput); });
  }
  document.addEventListener('pointerdown',e=>{
    if(typingProxy.classList.contains('on') && e.target!==typingProxy){
      exitTypingMode();
    }
    if(e.target===typingProxy || e.target.closest('button')) return;
    const inp=activeActionInput();
    if(!inp) return;
    const r=inp.getBoundingClientRect();
    const padX=16, padY=12;
    const inside=e.clientX>=r.left-padX && e.clientX<=r.right+padX &&
      e.clientY>=r.top-padY && e.clientY<=r.bottom+padY;
    if(!inside) return;
    if(shouldUseTypingProxy(inp)){
      e.preventDefault();
      e.stopPropagation();
      enterTypingMode(inp);
    }else{
      activeInput=inp;
      inp.focus({preventScroll:true});
    }
  },true);
  typingProxy.addEventListener('input',()=>{
    commitTypingProxy();
    keepInputVisible(typingProxy);
  });
  typingProxy.addEventListener('keydown',e=>{
    if(e.key==='Enter'){ e.preventDefault(); typingProxy.blur(); }
  });
  typingProxy.addEventListener('blur',()=>{
    setTimeout(()=>{
      if(document.activeElement!==typingProxy) exitTypingMode();
    },0);
  });
  document.querySelectorAll('.actinput').forEach(inp=>{
    inp.addEventListener('pointerdown',e=>{
      if(shouldUseTypingProxy(inp)){
        e.preventDefault();
        e.stopPropagation();
        enterTypingMode(inp);
      }else{
        activeInput=inp;
        inp.focus({preventScroll:true});
      }
    });
    inp.addEventListener('focus',()=>enterTypingMode(inp));
    inp.addEventListener('input',()=>keepInputVisible(typingProxy));
    inp.addEventListener('blur',()=>{
      setTimeout(()=>{
        if(document.activeElement!==typingProxy) exitTypingMode();
      },0);
    });
  });

  let toastT=null;
  function showToast(msg){
    const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');
    clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('on'),1800);
  }

  render(); renderStats(); refreshStartButtons(); updateNav();
})();
</script>
</body>
</html>
